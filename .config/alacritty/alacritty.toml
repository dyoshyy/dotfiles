# ~/.config/alacritty/alacritty.toml

[window]
opacity = 0.50
padding = { x = 10, y = 10 }
blur = true

[font]
size = 16.0

[font.normal]
family = "HackGen Console NF"

[font.bold]
family = "HackGen Console NF"
style = "Bold"

[env]
TERM = "xterm-256color"

[keyboard]
bindings = [
  { key = "Return", mods = "Shift", chars = "\u001B\r" }
]
